        const img = element.querySelector('img');
        const src = img.src;
        
        // Data attributes read kar rahe hain
        const name = img.getAttribute('data-name');
        const village = img.getAttribute('data-village');
        
        // Modal image set kar rahe hain
        document.getElementById('modalImage').src = src;
        
        // Watermark logic
        const watermarkDiv = document.getElementById('imageWatermark');
        const watermarkText = document.getElementById('watermarkText');
        
        if (name && village) {
            watermarkText.innerText = name + " | " + village;
            watermarkDiv.style.display = 'block'; // Agar naam hai toh dikhao
        } else {
            watermarkDiv.style.display = 'none'; // Agar nahi hai toh hide kardo
        }
        
        // Modal show karo
        var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
        myModal.show();
    }
</script>
</body>
</html>
